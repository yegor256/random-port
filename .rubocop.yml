---
AllCops:
  DisplayCopNames: true
  TargetRubyVersion: 3.3.10
  NewCops: enable
  SuggestExtensions: false
plugins:
  - rubocop-minitest
  - rubocop-rake
  - rubocop-performance
  - rubocop-elegant
Minitest/EmptyLineBeforeAssertionMethods:
  Enabled: false
Layout/EmptyLineAfterGuardClause:
  Enabled: false
Style/ClassAndModuleChildren:
  Enabled: false
Naming/FileName:
  Enabled: false
Metrics/MethodLength:
  Max: 50
Metrics/BlockLength:
  Max: 50
Style/ConditionalAssignment:
  Enabled: false
Style/ClassVars:
  Enabled: false
Metrics/PerceivedComplexity:
  Max: 20
Metrics/CyclomaticComplexity:
  Max: 20
Metrics/AbcSize:
  Max: 60
Metrics/ClassLength:
  Max: 160
Elegant/ClassInModule:
  Exclude:
    - 'lib/**/*'
    - '**/test_*.rb'
    - '**/*Test.rb'
Elegant/NoRedundantVariable:
  Exclude:
    - 'test/**/*'
